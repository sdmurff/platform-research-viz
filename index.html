<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Platform Papers — Semantic Topic Clusters</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e0e0e0; overflow: hidden; }
#container { width: 100vw; height: 100vh; position: relative; }
svg { width: 100%; height: 100%; }

#controls {
  position: absolute; top: 16px; left: 16px;
  background: rgba(15, 20, 35, 0.92); border: 1px solid #2a3050;
  border-radius: 10px; padding: 16px; width: 280px;
  backdrop-filter: blur(12px); z-index: 10;
}
#controls h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: #fff; }
#controls .subtitle { font-size: 11px; color: #6b7590; margin-bottom: 10px; }
#controls label { font-size: 12px; color: #8892a8; display: block; margin-top: 8px; }
#controls select, #controls input[type=range] { width: 100%; margin-top: 4px; }
select { background: #1a2035; color: #e0e0e0; border: 1px solid #2a3050; border-radius: 5px; padding: 5px 8px; font-size: 12px; }
input[type=range] { accent-color: #5b8def; }
.stat { font-size: 11px; color: #6b7590; margin-top: 4px; }

#tooltip {
  position: absolute; display: none; pointer-events: none;
  background: rgba(15, 20, 35, 0.95); border: 1px solid #3a4570;
  border-radius: 8px; padding: 12px 16px; max-width: 400px;
  backdrop-filter: blur(12px); z-index: 20;
  font-size: 12px; line-height: 1.5;
}
#tooltip .tt-label { font-weight: 600; font-size: 14px; color: #fff; margin-bottom: 4px; }
#tooltip .tt-title { color: #a0aac0; font-style: italic; margin-bottom: 6px; }
#tooltip .tt-stat { color: #8892a8; }
#tooltip .tt-stat span { color: #5b8def; font-weight: 600; }
#tooltip .tt-cluster { margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a3050; }

#treemap {
  position: absolute; bottom: 16px; left: 16px;
  background: rgba(15, 20, 35, 0.92); border: 1px solid #2a3050;
  border-radius: 10px; padding: 12px;
  backdrop-filter: blur(12px); z-index: 10;
  width: 360px;
}
#treemap h3 { font-size: 12px; margin-bottom: 8px; color: #fff; }
#treemap-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.treemap-cell {
  border-radius: 4px; padding: 4px 6px; cursor: pointer;
  font-size: 10px; line-height: 1.3; color: #fff;
  overflow: hidden; transition: opacity 0.2s;
}
.treemap-cell:hover { opacity: 0.8; }
.treemap-cell .cell-label { font-weight: 600; }
.treemap-cell .cell-count { opacity: 0.8; }

#right-panel {
  position: absolute; top: 16px; right: 16px;
  width: 260px; display: flex; flex-direction: column; gap: 12px;
  z-index: 10; max-height: calc(100vh - 32px); overflow: hidden;
}
#search-box {
  background: rgba(15, 20, 35, 0.92); border: 1px solid #2a3050;
  border-radius: 10px; padding: 12px 16px;
  backdrop-filter: blur(12px); flex-shrink: 0;
}
#search-box input {
  width: 100%; background: #1a2035; color: #e0e0e0;
  border: 1px solid #2a3050; border-radius: 5px;
  padding: 6px 10px; font-size: 12px; outline: none;
}
#search-box input:focus { border-color: #5b8def; }
#search-results { margin-top: 6px; max-height: 200px; overflow-y: auto; }
.search-result {
  padding: 4px 6px; cursor: pointer; border-radius: 4px; font-size: 11px;
  color: #a0aac0;
}
.search-result:hover { background: #1a2540; color: #fff; }

#legend {
  background: rgba(15, 20, 35, 0.92); border: 1px solid #2a3050;
  border-radius: 10px; padding: 12px 16px;
  backdrop-filter: blur(12px); font-size: 11px;
  overflow-y: auto; flex-shrink: 1; min-height: 0;
}
#legend h3 { font-size: 12px; margin-bottom: 6px; color: #fff; }
.legend-item { display: flex; align-items: center; margin: 3px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }

#cluster-detail {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(15, 20, 35, 0.92); border: 1px solid #2a3050;
  border-radius: 10px; padding: 12px 16px; width: 300px;
  backdrop-filter: blur(12px); z-index: 10;
  display: none; font-size: 12px;
}
#cluster-detail h3 { font-size: 14px; color: #fff; margin-bottom: 8px; }
#cluster-detail .detail-kw { color: #8892a8; margin-bottom: 4px; }
#cluster-detail .detail-anchor { color: #a0aac0; margin-top: 8px; }
#cluster-detail .close-btn {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: #6b7590; font-size: 16px;
}
#cluster-detail .close-btn:hover { color: #fff; }
</style>
</head>

const width = window.innerWidth;
const height = window.innerHeight;

const clusterColors = [
  '#e05555', '#e5a035', '#5bd48a', '#5b8def', '#c05bef',
  '#ef5b8d', '#5befcd', '#efd95b', '#8d5bef', '#ef8d5b',
  '#4a9', '#d66', '#69c', '#9c6', '#c69'
];

const journalColors = {
  'Strategic Management Journal': '#5b8def',
  'Management Science - MKT': '#ef5b8d',
  'Management Science - IS': '#8def5b',
  'Management Science - STR': '#ef8d5b',
  'Management Science - Ops': '#8d5bef',
  'Organization Science': '#5befcd',
  'Strategy Science': '#efd95b',
  'Academy of Management Review': '#ef5b5b',
  'Academy of Management Journal': '#5bd4ef',
};
const defaultColor = '#4a5580';

const yearExtent = d3.extent(data.nodes, d => d.year);
const yearColor = d3.scaleSequential(d3.interpolateViridis).domain(yearExtent);
const citeExtent = d3.extent(data.nodes, d => d.global_citations);
const citeColor = d3.scaleSequential(d3.interpolateInferno).domain([0, Math.log(citeExtent[1] + 1)]);

function colorFn(mode) {
  if (mode === 'cluster') return d => clusterColors[d.cluster % clusterColors.length];
  if (mode === 'journal') return d => journalColors[d.journal] || defaultColor;
  if (mode === 'year') return d => yearColor(d.year);
  if (mode === 'citations') return d => citeColor(Math.log(d.global_citations + 1));
  return d => defaultColor;
}

function sizeScale(field) {
  if (field === 'uniform') return d => 4;
  const ext = d3.extent(data.nodes, d => d[field]);
  const s = d3.scaleSqrt().domain([0, ext[1] || 1]).range([3, 24]);
  return d => s(d[field]);
}

let currentColor = colorFn('cluster');
let currentSize = sizeScale('cited_by_corpus');
let activeCluster = null;

const svg = d3.select('#graph');
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Scale t-SNE coords to screen space
const xExtent = d3.extent(data.nodes, d => d.x);
const yExtent = d3.extent(data.nodes, d => d.y);
const margin = 80;
const xScale = d3.scaleLinear().domain(xExtent).range([margin, width - margin]);
const yScale = d3.scaleLinear().domain(yExtent).range([margin, height - margin]);

// Initialize positions from t-SNE
data.nodes.forEach(d => {
  d.tsne_x = xScale(d.x);
  d.tsne_y = yScale(d.y);
  d.x = d.tsne_x;
  d.y = d.tsne_y;
});

const linkG = g.append('g');
const link = linkG.selectAll('line').data(data.edges).join('line')
  .attr('stroke', '#2a3565').attr('stroke-width', 0.4).attr('stroke-opacity', 0.25);

const nodeG = g.append('g');
const node = nodeG.selectAll('circle').data(data.nodes).join('circle')
  .attr('r', d => currentSize(d))
  .attr('fill', d => currentColor(d))
  .attr('stroke', '#0a0e17').attr('stroke-width', 0.5)
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active && layoutMode === 'force') sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end', (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

const label = nodeG.selectAll('text')
  .data(data.nodes.filter(d => d.cited_by_corpus >= 20))
  .join('text').text(d => d.label)
  .attr('font-size', 9).attr('fill', '#8892a8')
  .attr('dx', d => currentSize(d) + 3).attr('dy', 3)
  .attr('pointer-events', 'none');

let layoutMode = 'tsne';

function updatePositions() {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('cx',d=>d.x).attr('cy',d=>d.y);
  label.attr('x',d=>d.x).attr('y',d=>d.y);
}

// Place nodes at t-SNE positions initially
updatePositions();

const sim = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.edges).id(d => d.id).distance(60).strength(0.2))
  .force('charge', d3.forceManyBody().strength(-80).distanceMax(350))
  .force('center', d3.forceCenter(width/2, height/2))
  .force('collision', d3.forceCollide().radius(d => currentSize(d) + 1))
  .on('tick', updatePositions)
  .stop(); // Don't run simulation initially — use t-SNE layout

// Layout toggle
d3.select('#layout-mode').on('change', function() {
  layoutMode = this.value;
  if (layoutMode === 'tsne') {
    sim.stop();
    data.nodes.forEach(d => { d.x = d.tsne_x; d.y = d.tsne_y; d.fx = null; d.fy = null; });
    updatePositions();
  } else {
    sim.alpha(1).restart();
  }
});

  connected.add(d.id);
  node.attr('opacity', n => connected.has(n.id) ? 1 : 0.08);
  link.attr('stroke-opacity', l => {
    const si=typeof l.source==='object'?l.source.id:l.source;
    const ti=typeof l.target==='object'?l.target.id:l.target;
    return (si===d.id||ti===d.id)?0.6:0.02;
  }).attr('stroke', l => {
    const si=typeof l.source==='object'?l.source.id:l.source;
    const ti=typeof l.target==='object'?l.target.id:l.target;
    return (si===d.id||ti===d.id)?clusterColors[d.cluster]:('#2a3565');
  });
  label.attr('opacity', n => connected.has(n.id)?1:0.1);
})
.on('mousemove', e => { tooltip.style('left',(e.pageX+15)+'px').style('top',(e.pageY-10)+'px'); })
.on('mouseout', () => {
  tooltip.style('display','none');
  if (activeCluster !== null) { highlightCluster(activeCluster); }
  else { resetHighlight(); }
});

function resetHighlight() {
  const op = +d3.select('#link-opacity').property('value')/100;
  node.attr('opacity',1);
  link.attr('stroke-opacity',op).attr('stroke','#2a3565');
  label.attr('opacity',1);
}

function highlightCluster(c) {
  const inCluster = new Set(data.nodes.filter(d=>d.cluster===c).map(d=>d.id));
  node.attr('opacity', d => inCluster.has(d.id)?1:0.08);
  link.attr('stroke-opacity', l => {
    const si=typeof l.source==='object'?l.source.id:l.source;
    const ti=typeof l.target==='object'?l.target.id:l.target;
    return (inCluster.has(si)&&inCluster.has(ti))?0.4:0.02;
  }).attr('stroke', l => {
    const si=typeof l.source==='object'?l.source.id:l.source;
    const ti=typeof l.target==='object'?l.target.id:l.target;
    return (inCluster.has(si)&&inCluster.has(ti))?clusterColors[c]:'#2a3565';
  });
  label.attr('opacity', d => inCluster.has(d.id)?1:0.1);
}

// Treemap
const treemapGrid = d3.select('#treemap-grid');
const sortedClusters = Object.entries(data.clusters).sort((a,b) => b[1].size - a[1].size);
const totalPapers = data.nodes.length;

sortedClusters.forEach(([cId, info]) => {
  const c = parseInt(cId);
  const widthPct = Math.max(info.size / totalPapers * 100 * 2.5, 15);
  const cell = treemapGrid.append('div').attr('class', 'treemap-cell')
    .style('background', clusterColors[c])
    .style('width', widthPct + '%')
    .style('min-height', '36px');
  cell.append('div').attr('class', 'cell-label').text(info.label.split(',').slice(0,2).join(', '));
  cell.append('div').attr('class', 'cell-count').text(info.size + ' papers');
  cell.on('click', () => {
    if (activeCluster === c) {
      activeCluster = null;
      resetHighlight();
      d3.select('#cluster-detail').style('display', 'none');
    } else {
      activeCluster = c;
      highlightCluster(c);
      // Show detail panel
      const det = d3.select('#cluster-detail').style('display', 'block');
      d3.select('#detail-title').html('Cluster ' + c + ': <span style="color:'+clusterColors[c]+'">' + info.label + '</span>');
      const kwList = (info.top_keywords || []).map(k => k[0] + ' (' + k[1] + ')').join(', ');
      d3.select('#detail-keywords').text('Keywords: ' + kwList);
      d3.select('#detail-anchor').html('Anchor paper: <strong>' + info.anchor_paper + '</strong><br><em>' + info.anchor_title + '</em>');
    }
  });
});

d3.select('#close-detail').on('click', () => {
  activeCluster = null;
  resetHighlight();
  d3.select('#cluster-detail').style('display', 'none');
});

// Legend
function updateLegend(mode) {
  const legend = d3.select('#legend');
  if (mode === 'cluster') {
    legend.style('display', 'none');
    return;
  }
  legend.style('display', 'block').html('<h3>Legend</h3>');
  if (mode === 'journal') {
    Object.entries(journalColors).forEach(([j, c]) => {
      legend.append('div').attr('class', 'legend-item')
        .html('<div class="legend-dot" style="background:' + c + '"></div>' + j);
    });
  } else if (mode === 'year') {
    [1986, 1995, 2005, 2010, 2015, 2020, 2025].forEach(y => {
      legend.append('div').attr('class', 'legend-item')
        .html('<div class="legend-dot" style="background:' + yearColor(y) + '"></div>' + y);
    });
  } else {
    [0, 100, 500, 1000, 2000].forEach(v => {
      legend.append('div').attr('class', 'legend-item')
        .html('<div class="legend-dot" style="background:' + citeColor(Math.log(v + 1)) + '"></div>' + v + '+');
    });
  }
}
updateLegend('cluster');

// Controls
d3.select('#color-by').on('change', function() {
  currentColor = colorFn(this.value);
  node.attr('fill', d => currentColor(d));
  updateLegend(this.value);
});

d3.select('#size-by').on('change', function() {
  currentSize = sizeScale(this.value);
  node.attr('r', d => currentSize(d));
  sim.force('collision', d3.forceCollide().radius(d => currentSize(d)+1));
  sim.alpha(0.3).restart();
  label.attr('dx', d => currentSize(d)+3);
});

d3.select('#min-cited').on('input', function() {
  const v = +this.value;
  d3.select('#min-cited-val').text(v);
  const vis = new Set(data.nodes.filter(d => d.cited_by_corpus >= v).map(d => d.id));
  node.attr('display', d => vis.has(d.id)?null:'none');
  link.attr('display', l => {
    const si=typeof l.source==='object'?l.source.id:l.source;
    const ti=typeof l.target==='object'?l.target.id:l.target;
    return (vis.has(si)&&vis.has(ti))?null:'none';
  });
  label.attr('display', d => vis.has(d.id)?null:'none');
});

d3.select('#link-opacity').on('input', function() {
  if (activeCluster === null) link.attr('stroke-opacity', +this.value/100);
});

// Search
d3.select('#search-input').on('input', function() {
  const q = this.value.toLowerCase();
  d3.select('#search-results').html('');
  if (q.length < 2) return;
  const matches = data.nodes.filter(d => d.label.toLowerCase().includes(q)||d.title.toLowerCase().includes(q)).slice(0,8);
  matches.forEach(d => {
    d3.select('#search-results').append('div').attr('class','search-result')
      .text(d.label+' - '+d.title.substring(0,50)+'...')
      .on('click', () => {
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(width/2-d.x*2,height/2-d.y*2).scale(2));
        node.filter(n=>n.id===d.id).attr('stroke','#fff').attr('stroke-width',3)
          .transition().duration(2000).attr('stroke','#0a0e17').attr('stroke-width',0.5);
      });
  });
});

})();
</script>
</body>
</html>
